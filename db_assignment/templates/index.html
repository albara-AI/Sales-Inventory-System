<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sales & Inventory System</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="login-container">
    <div class="login-card">
        <h1 class="login-title">Sales & Inventory</h1>
        <p style="margin-bottom: 2rem; color: #4B5563;">Select your role to continue</p>
        
        <div class="login-options">
            <a href="/admin" class="btn btn-primary login-btn-lg">
                Login as Admin
            </a>
            <a href="/user" class="btn btn-secondary login-btn-lg">
                Login as User
            </a>
        </div>
    </div>
</body>
</html>
