<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Sales & Inventory</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body>
    <header class="header">
        <div class="container nav">
            <div class="nav-brand">Sales & Inventory <span
                    style="font-weight: 400; font-size: 0.9em; margin-left: 0.5rem; color: var(--text-muted);">Admin</span>
            </div>
            <a href="/" class="btn btn-secondary">Logout</a>
        </div>
    </header>

    <main class="container">
        <!-- Stats Row -->
        <section class="grid" style="margin-bottom: 3rem;" id="dashboard-stats">
            <div class="card stat-card">
                <span class="stat-value" id="total-revenue">$0.00</span>
                <span class="stat-label">Total Revenue</span>
            </div>
            <div class="card stat-card">
                <span class="stat-value" id="total-orders">0</span>
                <span class="stat-label">Total Orders</span>
            </div>
            <div class="card stat-card">
                <span class="stat-value" id="stock-value">-</span>
                <span class="stat-label">System Status</span>
            </div>
        </section>

        <!-- Tabs -->
        <div style="margin-bottom: 2rem;">
            <button onclick="switchTab('products')" class="btn btn-primary"
                style="margin-right: 1rem;">Products</button>
            <button onclick="switchTab('inventory')" class="btn btn-secondary">Inventory & Warehouses</button>
        </div>

        <!-- Products Section -->
        <section id="products-section">
            <div class="card">
                <div class="nav" style="margin-bottom: 1.5rem;">
                    <h2>Manage Products</h2>
                    <button onclick="showAddProductModal()" class="btn btn-primary">+ Add Product</button>
                </div>
                <table id="products-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>SKU</th>
                            <th>Price</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="products-body">
                        <!-- Populated by JS -->
                    </tbody>
                </table>
            </div>
        </section>

        <!-- Inventory Section -->
        <section id="inventory-section" style="display: none;">
            <div class="grid" style="margin-bottom: 2rem;">
                <div class="card">
                    <div class="nav" style="margin-bottom: 1.5rem;">
                        <h2>Warehouses</h2>
                        <button onclick="showAddWarehouseModal()" class="btn btn-primary">+ Add</button>
                    </div>
                    <ul id="warehouse-list" style="list-style: none; padding: 0;">
                        <!-- Populate -->
                    </ul>
                </div>
                <div class="card">
                    <h2>Stock Levels</h2>
                    <div style="margin-bottom: 1rem;">
                        <input type="number" id="stock-prod-id" placeholder="Product ID" class="form-input"
                            style="width: auto; display: inline-block;">
                        <button onclick="loadStock()" class="btn btn-secondary">Check Stock</button>
                    </div>
                    <table id="stock-table">
                        <thead>
                            <tr>
                                <th>Warehouse</th>
                                <th>Qty</th>
                            </tr>
                        </thead>
                        <tbody id="stock-body">
                            <!-- Populated -->
                        </tbody>
                    </table>
                </div>
            </div>

            <div class="card">
                <h2>Record Stock Movement</h2>
                <form id="stock-movement-form" onsubmit="handleStockMovement(event)">
                    <div class="grid">
                        <div class="form-group">
                            <label class="form-label">Product ID</label>
                            <input type="number" name="product_id" class="form-input" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Warehouse ID</label>
                            <input type="number" name="warehouse_id" class="form-input" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Quantity</label>
                            <input type="number" name="quantity" class="form-input" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Type</label>
                            <select name="movement_type" class="form-select">
                                <option value="in">IN (Add Stock)</option>
                                <option value="out">OUT (Remove Stock)</option>
                            </select>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary">Submit Movement</button>
                </form>
            </div>
        </section>
    </main>

    <!-- Modals (Simplified as hidden forms/overlays) -->
    <div id="product-modal"
        style="display:none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.5); align-items: center; justify-content: center;">
        <div class="card" style="width: 400px; max-width: 90%;">
            <h2 style="margin-top: 0;">Product Details</h2>
            <form id="product-form" onsubmit="handleSaveProduct(event)">
                <input type="hidden" name="product_id" id="prod-id">
                <div class="form-group">
                    <label class="form-label">Name</label>
                    <input type="text" name="name" id="prod-name" class="form-input" required>
                </div>
                <div class="form-group">
                    <label class="form-label">SKU</label>
                    <input type="text" name="sku" id="prod-sku" class="form-input" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Price</label>
                    <input type="number" step="0.01" name="unit_price" id="prod-price" class="form-input" required>
                </div>
                <div style="text-align: right;">
                    <button type="button" onclick="closeModal()" class="btn btn-secondary">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save</button>
                </div>
            </form>
        </div>
    </div>

    <script src="/static/script.js"></script>
    <script>
        // Init
        document.addEventListener('DOMContentLoaded', () => {
            loadDashboardStats();
            loadProducts();
            loadWarehouses();
        });
    </script>
</body>

</html>
